<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agile Model — Animated</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
    :root {
        --hubText: #6b7280;   /* SPRINT n labels */
        --hubBorder: #e3e7ec;
        --lblText: #ffffff;   /* phase names on arrows */
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Inter', sans-serif;
        background: #f8fafc;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        color: #1f2937;
    }

    .stage-heading { text-align: center; margin-bottom: 6px; }
    .stage-heading h1 { font-size: 1.6rem; font-weight: 700; color: #1f2937; }
    .stage-heading p  { font-size: 0.95rem; color: #6b7280; font-style: italic; margin-top: 4px; }

    .stage {
        width: 100%;
        max-width: 940px;
        background: #ffffff;
        border: 1px solid #eef2f7;
        border-radius: 16px;
        box-shadow: 0 8px 30px rgba(15, 23, 42, 0.06);
        padding: 28px 24px 32px;
        margin-top: 22px;
    }

    svg { width: 100%; height: auto; display: block; }

    /* ── TEXT ── */
    .hub-name  { fill: var(--hubText); font-family: 'Inter', sans-serif; font-weight: 800; font-size: 17px; letter-spacing: 0.5px; }
    .hub-num   { fill: var(--hubText); font-family: 'Inter', sans-serif; font-weight: 800; font-size: 22px; }
    .phase-t   { fill: var(--lblText); font-family: 'Inter', sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 0.6px; }
    .launch-t  { fill: var(--lblText); font-family: 'Inter', sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 0.6px; }

    .seg path, .launch path { filter: drop-shadow(0 2px 3px rgba(0,0,0,0.16)); }
    .hub circle { filter: drop-shadow(0 2px 4px rgba(0,0,0,0.06)); }

    /* ── REVEAL ANIMATION ── */
    .reveal {
        opacity: 0;
        transform: scale(0.82);
        transform-box: fill-box;
        transform-origin: center;
        transition: opacity 0.4s ease, transform 0.45s cubic-bezier(0.2, 0.75, 0.25, 1);
    }
    .reveal.show { opacity: 1; transform: scale(1); }

    .launch.reveal { transform: translateX(-14px); }
    .launch.reveal.show { transform: translateX(0); }

    @media (prefers-reduced-motion: reduce) {
        .reveal { transition: none; }
    }
</style>
</head>
<body>

    <div class="stage-heading">
        <h1>Agile Model</h1>
        <p>Work ships in short, repeating sprints — each cycle plans, builds, tests &amp; reviews</p>
    </div>

    <div class="stage">
        <svg id="agile" viewBox="0 0 900 360" role="img" aria-label="Animated Agile Model diagram with three sprint cycles"></svg>
    </div>

<script>
    // ─────────────────────────────────────────────────────────────
    // Agile diagram, generated as inline SVG then revealed step-by-step.
    // Mirrors the waterfall reference: a .reveal/.show CSS technique driven
    // by a JS step sequence that plays once, holds, clears, and replays.
    // ─────────────────────────────────────────────────────────────

    const SVGNS = "http://www.w3.org/2000/svg";
    const svg = document.getElementById("agile");

    // Phase order around the ring, counter-clockwise as in the source image.
    // Angle convention: 0°=right (3 o'clock), 90°=bottom, 180°=left, 270°=top
    // (y-down screen ⇒ increasing angle is clockwise). Forward = decreasing angle.
    const PHASES = [
        { key: "plan",    label: "PLAN",    angle: 120 },
        { key: "design",  label: "DESIGN",  angle: 60  },
        { key: "develop", label: "DEVELOP", angle: 0   },
        { key: "test",    label: "TEST",    angle: 300 },
        { key: "deploy",  label: "DEPLOY",  angle: 240 },
        { key: "review",  label: "REVIEW",  angle: 180 },
    ];

    // Per-sprint colour ramp (light → dark), matching the image's palette.
    const SPRINTS = [
        { num: "1", cx: 175, c0: "#e74c3c", c1: "#7d1620", launch: "#a52a22" },  // reds
        { num: "2", cx: 450, c0: "#f6cf3f", c1: "#e2761a", launch: "#ef9b18" },  // yellow → orange
        { num: "3", cx: 725, c0: "#b6cc3b", c1: "#1e7a3a", launch: "#5aa02f" },  // lime → green
    ];

    const CY = 168, RO = 88, RI = 54, RMID = (RO + RI) / 2;

    const rad = d => d * Math.PI / 180;
    const P = (cx, cy, r, deg) => ({ x: cx + r * Math.cos(rad(deg)), y: cy + r * Math.sin(rad(deg)) });

    function lerpColor(a, b, t) {
        const pa = [parseInt(a.slice(1, 3), 16), parseInt(a.slice(3, 5), 16), parseInt(a.slice(5, 7), 16)];
        const pb = [parseInt(b.slice(1, 3), 16), parseInt(b.slice(3, 5), 16), parseInt(b.slice(5, 7), 16)];
        const mix = pa.map((v, i) => Math.round(v + (pb[i] - v) * t));
        return "#" + mix.map(v => v.toString(16).padStart(2, "0")).join("");
    }

    // A curved arrow (annular sector with an arrowhead at the leading end).
    function segPath(cx, cy, c) {
        const aT = c + 25, aB = c - 11, aTip = c - 25, barb = 7;
        const oT = P(cx, cy, RO, aT), oB = P(cx, cy, RO, aB);
        const iT = P(cx, cy, RI, aT), iB = P(cx, cy, RI, aB);
        const bo = P(cx, cy, RO + barb, aB), bi = P(cx, cy, RI - barb, aB);
        const tip = P(cx, cy, RMID, aTip);
        return `M${oT.x},${oT.y} A${RO},${RO} 0 0 0 ${oB.x},${oB.y}`
             + ` L${bo.x},${bo.y} L${tip.x},${tip.y} L${bi.x},${bi.y} L${iB.x},${iB.y}`
             + ` A${RI},${RI} 0 0 1 ${iT.x},${iT.y} Z`;
    }

    // Horizontal PLAN ▸ LAUNCH arrow that chains one sprint into the next.
    function launchPath(cx) {
        const x0 = cx - 96, x1 = cx + 96, yb = CY + RO + 28, h = 14, head = 16;
        return `M${x0},${yb - h} L${x1 - head},${yb - h} L${x1 - head},${yb - h - 7}`
             + ` L${x1},${yb} L${x1 - head},${yb + h + 7} L${x1 - head},${yb + h} L${x0},${yb + h} Z`;
    }

    function el(tag, attrs, parent) {
        const n = document.createElementNS(SVGNS, tag);
        for (const k in attrs) n.setAttribute(k, attrs[k]);
        if (parent) parent.appendChild(n);
        return n;
    }

    const steps = [];   // reveal order: array of selector-arrays

    SPRINTS.forEach(sp => {
        const sid = `s${sp.num}`;

        // ── hub (centre circle + SPRINT label) ──
        const hub = el("g", { id: `${sid}-hub`, class: "reveal hub" }, svg);
        el("circle", { cx: sp.cx, cy: CY, r: RI - 4, fill: "#ffffff", stroke: "var(--hubBorder)", "stroke-width": 1.5 }, hub);
        const tName = el("text", { x: sp.cx, y: CY - 4, "text-anchor": "middle", class: "hub-name" }, hub);
        tName.textContent = "SPRINT";
        const tNum = el("text", { x: sp.cx, y: CY + 20, "text-anchor": "middle", class: "hub-num" }, hub);
        tNum.textContent = sp.num;
        steps.push([`#${sid}-hub`]);

        // ── six phase arrows ──
        PHASES.forEach((ph, i) => {
            const fill = lerpColor(sp.c0, sp.c1, i / (PHASES.length - 1));
            const g = el("g", { id: `${sid}-${ph.key}`, class: "reveal seg" }, svg);
            el("path", { d: segPath(sp.cx, CY, ph.angle), fill }, g);

            // phase label, rotated to follow the ring (kept upright)
            const pos = P(sp.cx, CY, RMID, ph.angle);
            let rot = ph.angle + 90;
            if (rot >= 90 && rot <= 270) rot -= 180;
            const t = el("text", {
                x: pos.x, y: pos.y, "text-anchor": "middle", "dominant-baseline": "central",
                class: "phase-t", transform: `rotate(${rot} ${pos.x} ${pos.y})`,
            }, g);
            t.textContent = ph.label;

            steps.push([`#${sid}-${ph.key}`]);
        });

        // ── bottom launch arrow ──
        const lg = el("g", { id: `${sid}-launch`, class: "reveal launch" }, svg);
        el("path", { d: launchPath(sp.cx), fill: sp.launch }, lg);
        const yb = CY + RO + 28;
        el("line", { x1: sp.cx - 8, y1: yb - 12, x2: sp.cx - 8, y2: yb + 12, stroke: "rgba(255,255,255,0.5)", "stroke-width": 1.5 }, lg);
        const lPlan = el("text", { x: sp.cx - 52, y: yb + 1, "text-anchor": "middle", "dominant-baseline": "central", class: "launch-t" }, lg);
        lPlan.textContent = "PLAN";
        const lLaunch = el("text", { x: sp.cx + 38, y: yb + 1, "text-anchor": "middle", "dominant-baseline": "central", class: "launch-t" }, lg);
        lLaunch.textContent = "LAUNCH";
        steps.push([`#${sid}-launch`]);
    });

    // ───────────────────────── playback ─────────────────────────
    const STEP = 420;   // ms between reveals
    const HOLD = 2800;  // ms to hold the finished diagram
    const GAP  = 700;   // ms blank before replaying

    const allEls = () => document.querySelectorAll(".reveal");
    const revealAll = () => allEls().forEach(e => e.classList.add("show"));
    const clearAll  = () => allEls().forEach(e => e.classList.remove("show"));

    if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
        revealAll();
    } else {
        const playOnce = () => steps.forEach((group, i) => setTimeout(() => {
            group.forEach(sel => svg.querySelector(sel)?.classList.add("show"));
        }, i * STEP));

        const loop = () => {
            playOnce();
            const total = steps.length * STEP + HOLD;
            setTimeout(() => { clearAll(); setTimeout(loop, GAP); }, total);
        };
        loop();
    }
</script>

</body>
</html>
