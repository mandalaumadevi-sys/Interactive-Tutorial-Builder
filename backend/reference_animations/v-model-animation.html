<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>V-Model — Animated</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
    :root {
        --boxText: #ffffff;
        --armText: #ffffff;
        --link: #8a8f98;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        font-family: 'Inter', sans-serif;
        background: #f8fafc;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        color: #1f2937;
    }

    .stage-heading { text-align: center; margin-bottom: 6px; }
    .stage-heading h1 { font-size: 1.6rem; font-weight: 700; color: #1f2937; }
    .stage-heading p  { font-size: 0.95rem; color: #6b7280; font-style: italic; margin-top: 4px; }

    .stage {
        width: 100%;
        max-width: 940px;
        background: #ffffff;
        border: 1px solid #eef2f7;
        border-radius: 16px;
        box-shadow: 0 8px 30px rgba(15, 23, 42, 0.06);
        padding: 28px 24px 32px;
        margin-top: 22px;
    }

    svg { width: 100%; height: auto; display: block; }

    /* ── TEXT ── */
    .box-t  { fill: var(--boxText); font-family: 'Inter', sans-serif; font-weight: 700; font-size: 13px; }
    .arm-t  { fill: var(--armText); font-family: 'Inter', sans-serif; font-weight: 800; font-size: 17px; letter-spacing: 0.5px; }

    .box polygon, .coding polygon { filter: drop-shadow(0 2px 4px rgba(0,0,0,0.20)); }
    .arm polygon  { filter: drop-shadow(0 2px 4px rgba(0,0,0,0.10)); }

    /* ── REVEAL ANIMATION ── */
    .reveal {
        opacity: 0;
        transform: scale(0.84);
        transform-box: fill-box;
        transform-origin: center;
        transition: opacity 0.4s ease, transform 0.45s cubic-bezier(0.2, 0.75, 0.25, 1);
    }
    .reveal.show { opacity: 1; transform: scale(1); }

    .link.reveal { transform: scaleX(0.4); }
    .link.reveal.show { transform: scaleX(1); }

    @media (prefers-reduced-motion: reduce) {
        .reveal { transition: none; }
    }
</style>
</head>
<body>

    <div class="stage-heading">
        <h1>V-Model</h1>
        <p>Every build phase on the left is verified by a matching test phase on the right</p>
    </div>

    <div class="stage">
        <svg id="vmodel" viewBox="0 0 900 540" role="img" aria-label="Animated V-Model diagram: verification phase, validation phase, and Coding at the vertex"></svg>
    </div>

<script>
    // ─────────────────────────────────────────────────────────────
    // V-Model, generated as inline SVG then revealed level-by-level in
    // verification↔validation pairs (left build phase → matching right test
    // phase → the link between them), with Coding revealed last at the vertex.
    // Same .reveal/.show + replay-loop technique as the waterfall/agile files.
    // ─────────────────────────────────────────────────────────────

    const SVGNS = "http://www.w3.org/2000/svg";
    const svg = document.getElementById("vmodel");

    // Corresponding build (left) / test (right) phases, top → bottom.
    const LEVELS = [
        { y: 90,
          left:  { key: "req",  lines: ["Requirement", "Gathering"], cx: 210, color: "#c1673c" },
          right: { key: "acc",  lines: ["Acceptance", "Testing"],    cx: 690, color: "#5f8c92" } },
        { y: 168,
          left:  { key: "sysa", lines: ["System", "Analysis"],       cx: 255, color: "#d6a04e" },
          right: { key: "syst", lines: ["System", "Testing"],        cx: 645, color: "#6f9aa0" } },
        { y: 246,
          left:  { key: "swd",  lines: ["Software", "Design"],        cx: 300, color: "#cf9a63" },
          right: { key: "intt", lines: ["Integration", "Testing"],   cx: 600, color: "#7ba6a6" } },
        { y: 324,
          left:  { key: "mod",  lines: ["Module", "Design"],          cx: 345, color: "#b27d4a" },
          right: { key: "unit", lines: ["Unit", "Testing"],          cx: 555, color: "#87b0ad" } },
    ];
    const CODING = { cx: 450, cy: 438, color: "#8a5a3c" };

    const BW = 120, BH = 48, SHEAR = 10;   // box width, height, parallelogram shear

    function el(tag, attrs, parent) {
        const n = document.createElementNS(SVGNS, tag);
        for (const k in attrs) n.setAttribute(k, attrs[k]);
        if (parent) parent.appendChild(n);
        return n;
    }

    // Parallelogram corners (s = horizontal shear; left arm leans one way, right the other).
    function boxPts(cx, cy, w, h, s) {
        const hw = w / 2, hh = h / 2;
        return [[cx - hw + s, cy - hh], [cx + hw + s, cy - hh],
                [cx + hw - s, cy + hh], [cx - hw - s, cy + hh]]
            .map(p => p.map(v => v.toFixed(1)).join(",")).join(" ");
    }

    function addBox(id, cls, cx, cy, color, lines, shear) {
        const g = el("g", { id, class: `reveal box ${cls}` }, svg);
        el("polygon", { points: boxPts(cx, cy, BW, BH, shear), fill: color }, g);
        const oy = lines.length > 1 ? -5 : 5;
        lines.forEach((ln, i) => {
            const t = el("text", { x: cx, y: cy + oy + i * 17 + 5, "text-anchor": "middle", class: "box-t" }, g);
            t.textContent = ln;
        });
        return g;
    }

    // Tapered arrow band (shaft + arrowhead) from (sx,sy) to (ex,ey), tip at the end.
    function armBand(sx, sy, ex, ey, halfW, headLen, headW) {
        const dx = ex - sx, dy = ey - sy, len = Math.hypot(dx, dy);
        const ux = dx / len, uy = dy / len, px = -uy, py = ux;
        const bx = ex - ux * headLen, by = ey - uy * headLen;
        const pts = [
            [sx + px * halfW, sy + py * halfW],
            [bx + px * halfW, by + py * halfW],
            [bx + px * headW, by + py * headW],
            [ex, ey],
            [bx - px * headW, by - py * headW],
            [bx - px * halfW, by - py * halfW],
            [sx - px * halfW, sy - py * halfW],
        ];
        return pts.map(p => p.map(v => v.toFixed(1)).join(",")).join(" ");
    }

    function addArm(id, sx, sy, ex, ey, color, label) {
        const g = el("g", { id, class: "reveal arm" }, svg);
        el("polygon", { points: armBand(sx, sy, ex, ey, 22, 34, 33), fill: color }, g);
        const mx = sx + (ex - sx) * 0.46, my = sy + (ey - sy) * 0.46;
        let ang = Math.atan2(ey - sy, ex - sx) * 180 / Math.PI;
        const t = el("text", { x: mx, y: my, "text-anchor": "middle", "dominant-baseline": "central",
                               class: "arm-t", transform: `rotate(${ang.toFixed(1)} ${mx} ${my})` }, g);
        t.textContent = label;
        return g;
    }

    // Horizontal double-headed link between a left box and its right counterpart.
    function addLink(id, x1, x2, y) {
        const g = el("g", { id, class: "reveal link" }, svg);
        el("line", { x1: x1 + 9, y1: y, x2: x2 - 9, y2: y, stroke: "var(--link)",
                     "stroke-width": 2.5, "stroke-dasharray": "6 5", "stroke-linecap": "round" }, g);
        el("polygon", { points: `${x1},${y} ${x1 + 11},${y - 6} ${x1 + 11},${y + 6}`, fill: "var(--link)" }, g);   // ◄ left
        el("polygon", { points: `${x2},${y} ${x2 - 11},${y - 6} ${x2 - 11},${y + 6}`, fill: "var(--link)" }, g);   // ► right
        return g;
    }

    const steps = [];

    // ── V skeleton: the two big arms + their phase labels (revealed first) ──
    addArm("arm-left",  95, 66, 372, 500, "#b9824f", "Verification Phase");   // points down to vertex
    addArm("arm-right", 528, 500, 805, 66, "#7c9ea0", "Validation Phase");    // points up to the top
    steps.push(["#arm-left", "#arm-right"]);

    // ── verification ↔ validation pairs, level by level ──
    LEVELS.forEach((lv, i) => {
        addBox(`L${i}-left`,  "left",  lv.left.cx,  lv.y, lv.left.color,  lv.left.lines,  -SHEAR);
        addBox(`L${i}-right`, "right", lv.right.cx, lv.y, lv.right.color, lv.right.lines,  SHEAR);
        addLink(`link${i}`, lv.left.cx + BW / 2 - SHEAR + 4, lv.right.cx - BW / 2 + SHEAR - 4, lv.y);
        steps.push([`#L${i}-left`]);
        steps.push([`#L${i}-right`]);
        steps.push([`#link${i}`]);
    });

    // ── Coding at the vertex (last) ──
    const cg = el("g", { id: "coding", class: "reveal coding" }, svg);
    el("polygon", { points: boxPts(CODING.cx, CODING.cy, 150, 50, 0), fill: CODING.color }, cg);
    const ct = el("text", { x: CODING.cx, y: CODING.cy + 5, "text-anchor": "middle", class: "box-t" }, cg);
    ct.textContent = "Coding";
    steps.push(["#coding"]);

    // ───────────────────────── playback ─────────────────────────
    const STEP = 430;   // ms between reveals
    const HOLD = 2800;  // ms to hold the finished diagram
    const GAP  = 700;   // ms blank before replaying

    const allEls = () => document.querySelectorAll(".reveal");
    const revealAll = () => allEls().forEach(e => e.classList.add("show"));
    const clearAll  = () => allEls().forEach(e => e.classList.remove("show"));

    if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
        revealAll();
    } else {
        const playOnce = () => steps.forEach((group, i) => setTimeout(() => {
            group.forEach(sel => svg.querySelector(sel)?.classList.add("show"));
        }, i * STEP));

        const loop = () => {
            playOnce();
            const total = steps.length * STEP + HOLD;
            setTimeout(() => { clearAll(); setTimeout(loop, GAP); }, total);
        };
        loop();
    }
</script>

</body>
</html>
